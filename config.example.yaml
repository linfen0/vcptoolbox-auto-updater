service_name: "VCPToolBoxAutoUpdater"
display_name: "VCP ToolBox Auto Updater"
description: "Automatically pulls VCPToolBox updates and restarts PM2 process."

log_level: INFO
log_file: "F:\\AI_Study_studio\\VCPToolBox\\vcptoolbox-auto-updater\\logs"

repo_path: "F:/AI_Study_studio/VCPToolBox"

git:
  remote_name: "origin"
  branch: "main"
  check_interval_hours: 24.0

pm2:
  pm2_bin: null           # 可选，默认自动从 PATH 查找
  processes:
    - name: "vcp-main"
      script: "server.js"
      watch: false
      max_memory_restart: "1500M"
      kill_timeout: 15000

    - name: "vcp-admin"
      script: "adminServer.js"
      watch: false
      max_memory_restart: "512M"
      kill_timeout: 5000

notifications:
  feishu:
    enabled: false
    app_id: "cli_xxxxxxxx"
    app_secret: "xxxxxxxx"
    receive_id: "ou_xxxxxxxx"
    receive_id_type: "open_id"

  wecom:
    enabled: false
    webhook_url: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=xxxxxxxx"

  email:
    enabled: false
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    username: "your-bot@gmail.com"
    password: "your-app-password"
    to_addrs:
      - "admin@example.com"
    use_tls: true
